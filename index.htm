
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre Animado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 400vh;
    background: #f5f0eb;
    font-family: 'Georgia', serif;
  }

  .sticky-container {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 380px;
    height: 260px;
  }

  /* ── LETTER ── */
  .letter {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    background: #fffdf8;
    border-radius: 4px;
    padding: 32px 36px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.13);
    /* starts hidden inside the envelope */
    bottom: 60px;
    z-index: 12;
    transition: none;
    /* clip so it stays hidden below envelope top initially */
    clip-path: inset(100% 0 0 0);
  }

  .letter-inner {
    opacity: 0;
    transition: opacity 0.3s;
  }
  
  .birthday-photo{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.birthday-photo img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:50%;
  border:4px solid #c8922a;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.letter .saludo{
  text-align:center;
  font-size:18px;
  color:#002345;
  margin-bottom:18px;
}

.letter p{
  text-align:center;
}

  .letter p {
    font-size: 13px;
    color: #4a3728;
    line-height: 1.8;
    margin-bottom: 10px;
  }

  .letter .saludo {
    font-size: 14px;
    font-weight: bold;
    color: #002345;
    margin-bottom: 14px;
  }

  .letter .firma {
    margin-top: 20px;
    font-style: italic;
    font-size: 12px;
    color: #888;
  }

  /* ── ENVELOPE BODY ── */
  .envelope {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 240px;
    z-index: 10;
  }

  /* Back of envelope */
  .env-back {
    position: absolute;
    inset: 0;
    background: #c8922a;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    overflow: hidden;
  }

  /* Diagonal texture lines */
  .env-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 6px,
      rgba(0,0,0,0.07) 6px,
      rgba(0,0,0,0.07) 7px
    );
  }

  /* Bottom triangle fold */
  .env-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 190px solid transparent;
    border-right: 190px solid transparent;
    border-bottom: 130px solid #b07d1f;
    z-index: 3;
  }

  /* Left triangle fold */
  .env-left {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 0;
    border-top: 120px solid transparent;
    border-bottom: 120px solid transparent;
    border-left: 195px solid #c08020;
    z-index: 2;
  }

  /* Right triangle fold */
  .env-right {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 0;
    height: 0;
    border-top: 120px solid transparent;
    border-bottom: 120px solid transparent;
    border-right: 195px solid #b87720;
    z-index: 2;
  }

  /* ── FLAP (top triangle) ── */
  .env-flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 380px;
    height: 200px;
    transform-origin: top center;
    z-index: 20;
    /* perspective for 3d fold */
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .env-flap-inner {
    width: 0;
    height: 0;
    border-left: 190px solid transparent;
    border-right: 190px solid transparent;
    border-top: 160px solid #d4982e;
    position: relative;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }

  /* Diagonal texture on flap */
  .env-flap-inner::before {
    content: '';
    position: absolute;
    top: -160px;
    left: -190px;
    width: 380px;
    height: 160px;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 6px,
      rgba(0,0,0,0.06) 6px,
      rgba(0,0,0,0.06) 7px
    );
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  }

  /* Seal circle */
  .seal {
    position: absolute;
    top: -110px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 36px;
    background: #002345;
    border-radius: 50%;
    border: 2px solid #ffd700;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: opacity 0.3s;
  }

  .seal span {
    color: #ffd700;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: -1px;
  }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #8a7060;
    font-size: 13px;
    letter-spacing: 0.05em;
    opacity: 1;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  .scroll-hint .arrow {
    display: block;
    margin: 6px auto 0;
    width: 20px;
    height: 20px;
    border-right: 2px solid #b07d1f;
    border-bottom: 2px solid #b07d1f;
    transform: rotate(45deg);
    animation: bounce 1.4s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50%       { transform: rotate(45deg) translateY(5px); }
  }
</style>
</head>
<body>

<div class="sticky-container">
  <div class="scene">

    <!-- LETTER (behind envelope) -->
<div class="letter" id="letter">
  <div class="letter-inner" id="letterInner">

    <div class="birthday-photo">
      <img src="https://i.imgur.com/TlfXjt0.jpeg" alt="Enna Liliana Vásquez Saldarriaga">
    </div>

    <p class="saludo">¡Estás cordialmente invitado!</p>

    <p>
      Te invitamos a celebrar los
      <strong>60 años de vida</strong>
      de
      <strong>Enna Liliana Vásquez Saldarriaga</strong>.
    </p>

    <p>
      Será una noche especial llena de alegría,
      recuerdos y momentos inolvidables junto a
      familiares y amigos.
    </p>

    <p>
      <strong>Lugar:</strong><br>
      Miguel Ortiz 648
    </p>

    <p class="firma">
      ¡Te esperamos!
    </p>

  </div>
</div>

    <!-- ENVELOPE -->
    <div class="envelope" id="envelope">
      <div class="env-back">
        <div class="env-left"></div>
        <div class="env-right"></div>
        <div class="env-bottom"></div>
      </div>

      <!-- FLAP -->
      <div class="env-flap" id="flap">
        <div class="env-flap-inner">
          <div class="seal" id="seal">
            <span>Q</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="scroll-hint" id="scrollHint">
  Desplázate para abrir
  <span class="arrow"></span>
</div>

<script>
  const flap       = document.getElementById('flap');
  const letter     = document.getElementById('letter');
  const letterInner = document.getElementById('letterInner');
  const seal       = document.getElementById('seal');
  const scrollHint = document.getElementById('scrollHint');

  // Scroll ranges (in px of page scroll)
  const FLAP_START  = 80;   // flap starts opening
  const FLAP_END    = 280;  // flap fully open
  const LETTER_START = 200; // letter starts rising
  const LETTER_END   = 600; // letter fully out

  function lerp(a, b, t) {
    return a + (b - a) * Math.min(Math.max(t, 0), 1);
  }

  function onScroll() {
    const y = window.scrollY;

    // ── Flap animation (rotates back around top edge) ──
    const flapProgress = (y - FLAP_START) / (FLAP_END - FLAP_START);
    const flapAngle    = lerp(0, -180, Math.min(Math.max(flapProgress, 0), 1));
    flap.style.transform = `perspective(600px) rotateX(${flapAngle}deg)`;
    // Send flap behind envelope body when >90°
    flap.style.zIndex = flapAngle < -90 ? 0 : 20;
    seal.style.opacity = flapProgress > 0.2 ? 0 : 1;

    // ── Letter animation ──
    const letterProgress = (y - LETTER_START) / (LETTER_END - LETTER_START);
    const clampedLP = Math.min(Math.max(letterProgress, 0), 1);

    // clip-path: reveal from bottom upward
    const clipTop = lerp(100, -10, clampedLP); // from fully hidden to fully visible
    letter.style.clipPath = `inset(${Math.max(clipTop, 0)}% 0 0 0)`;

    // Lift letter up
    const lift = lerp(60, -120, clampedLP);
    letter.style.bottom = lift + 'px';

    // Fade in text once letter is mostly out
    letterInner.style.opacity = clampedLP > 0.6
      ? ((clampedLP - 0.6) / 0.4).toFixed(2)
      : 0;

    // Hide scroll hint
    scrollHint.style.opacity = y > 60 ? 0 : 1;
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll(); // init state
</script>
</body>
</html>
